# Implementation definition for gcloud iam workforce-pools providers scim-tenants list
- release_tracks: [ALPHA, BETA, GA]
  help_text:
    brief: List IAM workforce identity pool provider SCIM tenants.
    description: |
      List all SCIM tenants associated with a specific workforce identity pool provider.
    examples: |
      To list all SCIM tenants under provider `my-okta-provider` in pool `my-pool` located in `global`:

        $ {command} --location=global  --workforce-pool=my-pool  --provider=my-okta-provider

      To list deleted SCIM tenants as well:

        $ {command} --location=global  --workforce-pool=my-pool  --provider=my-okta-provider   --show-deleted
  request:
    collection: iam.locations.workforcePools.providers.scimTenants
  arguments:
    resource:
      spec:
        name: workforce pool provider
        collection: iam.locations.workforcePools.providers
        request_id_field: workforcePoolProviderId
        attributes:
          - parameter_name: locationsId
            attribute_name: location
            help: The location for the workforce pool.
          - parameter_name: workforcePoolsId
            attribute_name: workforce_pool
            help: |
              The ID to use for the workforce pool, which becomes the final component of the
              resource name. This value must be a globally unique string of 6 to 63 lowercase letters,
              digits, or hyphens. It must start with a letter, and cannot have a trailing hyphen.
              The prefix `gcp-` is reserved for use by Google, and may not be specified.
          - parameter_name: providersId
            attribute_name: provider
            help: |
              The ID to use for the workforce pool provider, which becomes the final component of the
              resource name. This value must be unique within the workforce pool, 4-32 characters in length,
              and may contain the characters [a-z0-9-]. The prefix `gcp-` is reserved for use by Google,
              and may not be specified.
        disable_auto_completers: false
      help_text: The workforce identity pool provider under which to list SCIM tenants.
      is_positional: false
    params:
      - arg_name: show-deleted
        is_positional: false
        api_field: showDeleted
        required: false
        help_text: Include SCIM tenants that have been deleted.
  output:
    format: |
      table(
        name.basename():label=SCIM_TENANT_ID,
        displayName,
        state,
        baseUri
      )
