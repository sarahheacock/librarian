syntax = "proto3";

package method_locations.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/location/locations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "google.golang.org/genproto/googleapis/method_locations/v1;method_locations";

message Resource {
  option (google.api.resource) = {
    type: "example.googleapis.com/Resource"
    pattern: "projects/{project}/locations/{location}/resources/{resource}"
  };

  // Identifier. Resource name.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Optional. The labels on the resource, which can be used for categorization.
  map<string, string> labels = 2 [(google.api.field_behavior) = OPTIONAL];
}

// The request structure for the ListResources method.
message ListResourcesRequest {
  // Required. The parent of the resource.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "example.googleapis.com/Resource"
    }
  ];

  // The maximum number of resources to send per page.
  int32 page_size = 2;

  // The page token.
  string page_token = 3;
}

// The response structure for the ListResources method.
message ListResourcesResponse {
  // The resulting resources.
  repeated Resource resources = 1;

  // The next page token.
  string next_page_token = 2;
}

// The request structure for the GetResource method.
message GetResourceRequest {
  // Required. The resource name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "example.googleapis.com/Resource"
    }
  ];
}

service MethodLocations {
  option (google.api.default_host) = "methodlocations.googleapis.com";

  // Retrieve a collection of resources.
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/resources"
    };
    option (google.api.method_signature) = "parent";
  }

  // Retrieve a single resource.
  rpc GetResource(GetResourceRequest) returns (Resource) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/resources/*}"
    };
    option (google.api.method_signature) = "name";
  }
}
