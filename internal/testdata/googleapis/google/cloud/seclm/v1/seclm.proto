syntax = "proto3";

package google.cloud.seclm.v1;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/cloud/seclm/v1/citation_metadata.proto";
import "google/cloud/seclm/v1/generation.proto";
import "google/cloud/seclm/v1/safety.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.SecLM.V1";
option go_package = "cloud.google.com/go/seclm/apiv1/seclmpb;seclmpb";
option java_multiple_files = true;
option java_outer_classname = "SecLMProto";
option java_package = "com.google.cloud.seclm.v1";
option php_namespace = "Google\\Cloud\\SecLM\\V1";
option ruby_package = "Google::Cloud::SecLM::V1";

// Service describing handlers for resources for the SecLM API.
service SecLM {
  option (google.api.default_host) = "seclm.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/cloud-platform";

  // Lists SecLM Workbenches in a given project and location.
  rpc ListWorkbenches(ListWorkbenchesRequest)
      returns (ListWorkbenchesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=projects/*/locations/*}/workbenches"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets details of a single SecLM Workbench.
  rpc GetWorkbench(GetWorkbenchRequest) returns (Workbench) {
    option (google.api.http) = {
      get: "/v1/{name=projects/*/locations/*/workbenches/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Creates a new SecLM Workbench in a given project and location.
  rpc CreateWorkbench(CreateWorkbenchRequest)
      returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=projects/*/locations/*}/workbenches"
      body: "workbench"
    };
    option (google.api.method_signature) = "parent,workbench,workbench_id";
    option (google.longrunning.operation_info) = {
      response_type: "Workbench"
      metadata_type: "OperationMetadata"
    };
  }

  // Updates the parameters of a single SecLM Workbench.
  rpc UpdateWorkbench(UpdateWorkbenchRequest)
      returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{workbench.name=projects/*/locations/*/workbenches/*}"
      body: "workbench"
    };
    option (google.api.method_signature) = "workbench,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "Workbench"
      metadata_type: "OperationMetadata"
    };
  }

  // Deletes a single SecLM Workbench.
  rpc DeleteWorkbench(DeleteWorkbenchRequest)
      returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1/{name=projects/*/locations/*/workbenches/*}"
    };
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "google.protobuf.Empty"
      metadata_type: "OperationMetadata"
    };
  }

  // WorkbenchQuery is a custom pass-through verb that returns a single
  // SecLM Workbench.
  rpc WorkbenchQuery(WorkbenchQueryRequest) returns (WorkbenchQueryResponse) {
    option (google.api.http) = {
      post: "/v1/{name=projects/*/locations/*/workbenches/*}:query"
      body: "*"
    };
  }
}

// Message describing Workbench object.
message Workbench {
  option (google.api.resource) = {
    type: "seclm.googleapis.com/Workbench"
    pattern: "projects/{project}/locations/{location}/workbenches/{workbench}"
    plural: "workbenches"
    singular: "workbench"
  };

  // Identifier. Name of resource.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. Create time stamp.
  google.protobuf.Timestamp create_time = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Update time stamp.
  google.protobuf.Timestamp update_time = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Labels as key value pairs.
  map<string, string> labels = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Message for requesting list of Workbenches.
message ListWorkbenchesRequest {
  // Required. Parent value for ListWorkbenchesRequest.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "seclm.googleapis.com/Workbench"
    }
  ];

  // Optional. Requested page size. Server may return fewer items than
  // requested. If unspecified, server will pick an appropriate default.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A token identifying a page of results the server should return.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. String for filtering results.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Hint for how to order the results.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Message for response to listing Workbenches.
message ListWorkbenchesResponse {
  // The list of Workbench
  repeated Workbench workbenches = 1;

  // A token identifying a page of results the server should return.
  string next_page_token = 2;

  // Locations that could not be reached.
  repeated string unreachable = 3;
}

// Message for getting a Workbench.
message GetWorkbenchRequest {
  // Required. Name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "seclm.googleapis.com/Workbench" }
  ];
}

// Message for creating a Workbench.
message CreateWorkbenchRequest {
  // Required. Value for parent.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "seclm.googleapis.com/Workbench"
    }
  ];

  // Required. Id of the requesting object.
  // If auto-generating Id server-side, remove this field and
  // workbench_id from the method_signature of Create RPC.
  string workbench_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. The resource being created
  Workbench workbench = 3 [(google.api.field_behavior) = REQUIRED];

  // Optional. An optional request ID to identify requests. Specify a unique
  // request ID so that if you must retry your request, the server will know to
  // ignore the request if it has already been completed. The server will
  // guarantee that for at least 60 minutes since the first request.
  //
  // For example, consider a situation where you make an initial request and the
  // request times out. If you make the request again with the same request
  // ID, the server can check if original operation with the same request ID
  // was received, and if so, will ignore the second request. This prevents
  // clients from accidentally creating duplicate commitments.
  //
  // The request ID must be a valid UUID with the exception that zero UUID is
  // not supported (00000000-0000-0000-0000-000000000000).
  string request_id = 4 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Message for updating a Workbench.
message UpdateWorkbenchRequest {
  // Optional. Field mask is used to specify the fields to be overwritten in the
  // Workbench resource by the update.
  // The fields specified in the update_mask are relative to the resource, not
  // the full request. A field will be overwritten if it is in the mask. If the
  // user does not provide a mask then all fields will be overwritten.
  google.protobuf.FieldMask update_mask = 1
      [(google.api.field_behavior) = OPTIONAL];

  // Required. The resource being updated
  Workbench workbench = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional. An optional request ID to identify requests. Specify a unique
  // request ID so that if you must retry your request, the server will know to
  // ignore the request if it has already been completed. The server will
  // guarantee that for at least 60 minutes since the first request.
  //
  // For example, consider a situation where you make an initial request and the
  // request times out. If you make the request again with the same request
  // ID, the server can check if original operation with the same request ID
  // was received, and if so, will ignore the second request. This prevents
  // clients from accidentally creating duplicate commitments.
  //
  // The request ID must be a valid UUID with the exception that zero UUID is
  // not supported (00000000-0000-0000-0000-000000000000).
  string request_id = 3 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Message for deleting a Workbench.
message DeleteWorkbenchRequest {
  // Required. Name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "seclm.googleapis.com/Workbench" }
  ];

  // Optional. An optional request ID to identify requests. Specify a unique
  // request ID so that if you must retry your request, the server will know to
  // ignore the request if it has already been completed. The server will
  // guarantee that for at least 60 minutes after the first request.
  //
  // For example, consider a situation where you make an initial request and the
  // request times out. If you make the request again with the same request
  // ID, the server can check if original operation with the same request ID
  // was received, and if so, will ignore the second request. This prevents
  // clients from accidentally creating duplicate commitments.
  //
  // The request ID must be a valid UUID with the exception that zero UUID is
  // not supported (00000000-0000-0000-0000-000000000000).
  string request_id = 2 [
    (google.api.field_info).format = UUID4,
    (google.api.field_behavior) = OPTIONAL
  ];
}

// Message for querying a Workbench.
message WorkbenchQueryRequest {
  // Required. Name of the resource.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "seclm.googleapis.com/Workbench" }
  ];

  // Optional. The content of the current conversation with the model.
  //
  // For single-turn queries, this is a single instance. For multi-turn queries,
  // this is a repeated field that contains conversation history + latest
  // request.
  repeated Content contents = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Per request settings for blocking unsafe content.
  // Enforced on GenerateContentResponse.candidates.
  repeated SafetySetting safety_settings = 8
      [(google.api.field_behavior) = OPTIONAL];
}

// Response to querying a Workbench.
message WorkbenchQueryResponse {
  // Output only. Candidate responses from the model.
  repeated Candidate candidates = 6 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A response candidate generated from the model.
message Candidate {
  // Defines the reason why the model stopped generating tokens.
  enum FinishReason {
    // Default value. This value is unused.
    FINISH_REASON_UNSPECIFIED = 0;

    // Natural stop point of the model or provided stop sequence.
    STOP = 1;

    // The maximum number of tokens as specified in the request was reached.
    MAX_TOKENS = 2;

    // The candidate content was flagged for safety reasons.
    SAFETY = 3;

    // The candidate content was flagged for recitation reasons.
    RECITATION = 4;

    // Unknown reason.
    OTHER = 5;
  }

  // Output only. Index of the candidate in the list of candidates.
  optional int32 index = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Generated content returned from the model.
  Content content = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Output only. The reason why the model stopped generating tokens.
  //
  // If empty, the model has not stopped generating the tokens.
  FinishReason finish_reason = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // List of ratings for the safety of a response candidate.
  //
  // There is at most one rating per category.
  repeated SafetyRating safety_ratings = 5;

  // Output only. Citation information for model-generated candidate.
  //
  // This field may be populated with recitation information for any text
  // included in the `content`. These are passages that are "recited" from
  // copyrighted material in the foundational LLM's training data.
  CitationMetadata citation_metadata = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Token count for this candidate.
  int32 token_count = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Represents the metadata of the long-running operation.
message OperationMetadata {
  // Output only. The time the operation was created.
  google.protobuf.Timestamp create_time = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time the operation finished running.
  google.protobuf.Timestamp end_time = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Server-defined resource path for the target of the operation.
  string target = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Name of the verb executed by the operation.
  string verb = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Human-readable status of the operation, if any.
  string status_message = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Identifies whether the user has requested cancellation
  // of the operation. Operations that have been cancelled successfully
  // have [Operation.error][] value with a
  // [google.rpc.Status.code][google.rpc.Status.code] of 1, corresponding to
  // `Code.CANCELLED`.
  bool requested_cancellation = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. API version used to start the operation.
  string api_version = 7 [(google.api.field_behavior) = OUTPUT_ONLY];
}
