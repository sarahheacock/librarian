syntax = "proto3";

package google.cloud.seclm.v1;

import "google/api/field_behavior.proto";

option csharp_namespace = "Google.Cloud.SecLM.V1";
option go_package = "cloud.google.com/go/seclm/apiv1/seclmpb;seclmpb";
option java_multiple_files = true;
option java_outer_classname = "GenerationProto";
option java_package = "com.google.cloud.seclm.v1";
option php_namespace = "Google\\Cloud\\SecLM\\V1";
option ruby_package = "Google::Cloud::SecLM::V1";

// The base structured datatype containing multi-part content of a message.
//
// A `Content` includes a `role` field designating the producer of the `Content`
// and a `parts` field containing multi-part data that contains the content of
// the message turn.
message Content {
  // Optional. The producer of the content. Must be either 'user' or 'model'.
  //
  // Useful to set for multi-turn conversations, otherwise can be left blank
  // or unset.
  string role = 1 [(google.api.field_behavior) = OPTIONAL];

  // Required. Ordered `Parts` that constitute a single message. Parts may have
  // different IANA MIME types.
  repeated Part parts = 2 [(google.api.field_behavior) = REQUIRED];
}

// A datatype containing media that is part of a multi-part `Content` message.
//
// A `Part` consists of data which has an associated datatype. A `Part` can only
// contain one of the accepted types in `Part.data`.
message Part {
  oneof data {
    // Optional. Text part (can be code).
    string text = 1 [(google.api.field_behavior) = OPTIONAL];
  }
}
