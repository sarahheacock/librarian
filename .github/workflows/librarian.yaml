name: Librarian
on: [push, pull_request, merge_group]
permissions:
  contents: read
  issues: write
jobs:
  go-generate:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-librarian
      - name: Check go generate
        run: |
          go generate ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "go generate produced diffs:"
            git diff
            exit 1
          fi
  legacylibrarian:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-librarian
      - name: Run tests and check coverage
        run: go run ./tool/cmd/coverage ./internal/legacylibrarian/...
  test:
    runs-on: ubuntu-24.04
    # Presubmit jobs must complete within 5 minutes. See CONTRIBUTING.md.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-librarian
      - name: Install tools
        run: |
          go run ./cmd/librarian install go
      - name: Run tests and check coverage
        # TODO(https://github.com/googleapis/librarian/issues/4664): raise to 80.
        run: |
          go run ./tool/cmd/coverage -target=79 \
            $(go list ./... | grep -v -E 'internal/librarian/(dart|golang|java|nodejs|python|rust|swift)|internal/sidekick|internal/legacylibrarian')
  create-issue-on-failure:
    runs-on: ubuntu-24.04
    needs: [go-generate, legacylibrarian, test]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/create-issue-on-failure
        with:
          title: "all: tests failed at HEAD"
          body: "Tests failed at HEAD of the `main` branch. Please review Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} for detail."
